name: Deploy Cloud Run API

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".gcloudignore"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-api
  cancel-in-progress: true

env:
  PROJECT_ID: stock-picker-prod
  REGION: asia-east1
  SERVICE: stock-picker-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy API to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          source: .
          env_vars: |-
            ALLOWED_ORIGINS=https://tamyu321-source.github.io
            API_ACCESS_KEYS=${{ vars.CLOUD_RUN_API_ACCESS_KEYS || '19940710' }}
          env_vars_update_strategy: merge
          flags: |-
            --allow-unauthenticated
            --max-instances=2

      - name: Show service URL
        run: echo "Cloud Run URL: ${{ steps.deploy.outputs.url }}"
